name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  rust:
    name: Rust workspace
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo fmt --all -- --check
      - run: cargo check --workspace

  web:
    name: Web app
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npm run build

  compose:
    name: Compose config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: docker compose config

  scripts:
    name: Script syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: bash -n scripts/portfolio-demo.sh scripts/smoke-test.sh
