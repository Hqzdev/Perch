name: Bug report
description: Report something broken in Perch
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: List the exact steps to reproduce the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead?
    validations:
      required: true
  - type: input
    id: component
    attributes:
      label: Component
      placeholder: web, widget, gateway, indexer, retrieval, docs
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Remove secrets before attaching logs.
